<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="export_page_title">DMS - Експорт</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/export-document.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="modal-page">
    <div class="modal active">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="export-modal-title"><i class="fas fa-download"></i> <span data-i18n="export_modal_title">Експорт на документ</span></h2>
                <a href="versions.html" class="modal-close">&times;</a>
            </div>
            <div class="modal-body">
                <div class="export-editor-container">
                    <label for="export-content" data-i18n="export_edit_label">Редактирайте съдържанието преди експорт:</label>
                    <textarea id="export-content" class="export-editor" rows="15">Approved final content for the Project Charter document.</textarea>
                </div>
                <div class="export-actions">
                    <a class="export-option-btn" href="versions.html"><i class="fas fa-file-alt"></i><span data-i18n="export_download_txt">Изтегли TXT</span></a>
                    <a class="export-option-btn" href="versions.html"><i class="fas fa-file-pdf"></i><span data-i18n="export_download_pdf">Изтегли PDF</span></a>
                </div>
            </div>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="./js/shared/api.js"></script>
    <script src="./js/shared/common.js"></script>
    <script src="./js/export-document.js"></script>
</body>
</html>
