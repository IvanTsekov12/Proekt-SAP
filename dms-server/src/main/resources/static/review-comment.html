<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DMS - Коментар</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/review-comment.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="modal-page">
    <div class="modal active">
        <div class="modal-overlay"></div>
            <div class="modal-content">
            <div class="modal-header">
                <h2 id="review-modal-title"><i class="fas fa-comment"></i> Коментар</h2>
                <a href="versions.html" class="modal-close">&times;</a>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="review-comment-input">Добавете коментар (опционално):</label>
                    <textarea id="review-comment-input" rows="4" placeholder="Въведете причина за одобрение/отхвърляне..."></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <a href="versions.html" class="btn-secondary">Отказ</a>
                <button id="confirm-review-btn" type="button" class="btn-primary"><i class="fas fa-check"></i> <span id="confirm-review-text">Потвърди</span></button>
            </div>
        </div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="./js/shared/api.js"></script>
    <script src="./js/shared/common.js"></script>
    <script src="./js/review-comment.js"></script>
</body>
</html>
