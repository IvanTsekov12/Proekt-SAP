<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="documents_title">DMS - Документи</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/documents.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app-page" class="page active">
        <aside id="sidebar-root" class="sidebar"></aside>

        <main class="main-content">
            <div class="view active">
                <header class="view-header">
                    <div class="header-left">
                        <div>
                            <h1><i class="fas fa-folder-open"></i> <span data-i18n="documents_heading">Документи</span></h1>
                            <p class="subtitle" data-i18n="documents_subtitle">Управление на документи и версии</p>
                        </div>
                    </div>
                    <div class="header-actions">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input id="search-input" type="text" data-i18n-placeholder="search_placeholder" placeholder="Търсене...">
                        </div>
                        <a href="create-document.html" class="btn-primary"><span data-i18n="new_document">Нов документ</span></a>
                    </div>
                </header>

                <div class="content-area">
                    <div id="documents-sections" class="documents-sections">
                        <section class="documents-section">
                            <div class="section-header">
                                <h2><i class="fas fa-check-circle"></i> <span data-i18n="section_approved">Одобрени</span></h2>
                                <span id="approved-count" class="section-count">0</span>
                            </div>
                            <div id="approved-documents" class="documents-grid"></div>
                        </section>

                        <section class="documents-section">
                            <div class="section-header">
                                <h2><i class="fas fa-times-circle"></i> <span data-i18n="section_rejected">Отхвърлени</span></h2>
                                <span id="rejected-count" class="section-count">0</span>
                            </div>
                            <div id="rejected-documents" class="documents-grid"></div>
                        </section>

                        <section class="documents-section">
                            <div class="section-header">
                                <h2><i class="fas fa-hourglass-half"></i> <span data-i18n="section_review">В преглед</span></h2>
                                <span id="review-count" class="section-count">0</span>
                            </div>
                            <div id="review-documents" class="documents-grid"></div>
                        </section>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="./js/shared/api.js"></script>
    <script src="./js/shared/common.js"></script>
    <script src="./js/documents.js"></script>
</body>
</html>
